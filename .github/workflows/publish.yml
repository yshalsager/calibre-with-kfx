name: Publish Docker image

on:
  workflow_dispatch:
  push:
    paths:
      - "versions.json"
    branches:
      - master

jobs:
  push_to_registry:
    name: Push Docker image to docker hub
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, ' bump versions ') || github.event_name == 'workflow_dispatch' }}

    permissions:
      packages: write
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.PAT }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from commit message
        id: get-version
        run: |
          version=$(git log -1 --pretty=%B | grep -o '[0-9]\{8\}-[0-9]\{4\}')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Set image tag and description
        id: tag
        run: |
          versions_single=$(jq -r 'to_entries | map("\(.key): \(.value)") | join(" - ")' versions.json)
          versions_multiline=$(jq -r 'to_entries | map("- \(.key): \(.value)") | join("\n")' versions.json)
          repo='${{ github.repository }}'
          version='${{ steps.get-version.outputs.version }}'
          echo "description=Using $versions_single" >> "$GITHUB_OUTPUT"
          {
            echo "release_body<<EOF"
            printf '[ghcr.io/%s:%s](https://ghcr.io/%s) Built using:\n%s\n' "$repo" "$version" "$repo" "$versions_multiline"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: |
            ${{ github.repository }}:latest
            ${{ github.repository }}:${{ steps.get-version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.version }}
          labels: |
            org.opencontainers.image.description=${{ steps.tag.outputs.description }}

      - name: Test
        run: |
          curl -s -L -O "https://github.com/IDPF/epub3-samples/releases/download/20170606/trees.epub"
          echo "Running test script..."
          sudo chown 1000:1000 .
          docker run --rm -v "$(pwd):/app:rw" --entrypoint="bash" ${{ github.repository }}:latest -c "./test.sh trees.epub"

      - name: Create and push tag
        if: success()
        run: |
          git tag ${{ steps.get-version.outputs.version }}
          git push origin ${{ steps.get-version.outputs.version }}

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          name: ${{ steps.get-version.outputs.version }}
          body: ${{ steps.tag.outputs.release_body }}

      - name: Push Docker images
        if: success()
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ github.repository }}:latest
            ${{ github.repository }}:${{ steps.get-version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.version }}
          labels: |
            org.opencontainers.image.description=${{ steps.tag.outputs.description }}
